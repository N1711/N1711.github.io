		const openNav = () => document.getElementById("mySidepanel").style.width = "90px"; 				/* Set the width of the sidebar to 90px (show it) */

		const closeTemplate = () => document.getElementById("templatepanel").style.width = "0";

		}

  			document.getElementById("bottom-panel").style.height = "150px";
		}

		}

		const closebom = () => document.getElementById("rightpanel").style.width = "0";
